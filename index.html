<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0b0e14">
<meta name="robots" content="noindex,noarchive">
<title>MORIKAWAJIDOSHA — GAME PORTAL</title>
<style>
:root{
  --bg:#0b0e14; --panel:#141a26; --panel2:#1a2233;
  --line:#27324a; --tx:#d8e0ee; --dim:#7c89a4;
  --ac:#5fb4ff; --wr:#ffce63;
  --jp:"Hiragino Kaku Gothic ProN","Meiryo","Yu Gothic UI",system-ui,sans-serif;
  --mono:ui-monospace,"SF Mono","SFMono-Regular",Menlo,Consolas,"Liberation Mono",monospace;
}
*{box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{
  margin:0; background:var(--bg); color:var(--tx);
  font-family:var(--jp); line-height:1.6;
  -webkit-tap-highlight-color:transparent;
  padding:
    calc(28px + env(safe-area-inset-top)) 16px
    calc(28px + env(safe-area-inset-bottom));
  max-width:580px; margin:0 auto;
}

/* ---------- header ---------- */
.hd{border-bottom:1px solid var(--line); padding-bottom:18px; margin-bottom:22px}
.brand{display:flex; align-items:center; gap:12px}
.mark{flex:none; width:34px; height:34px}
.mark svg{display:block; width:100%; height:100%}
h1{
  font-family:var(--mono); font-size:18px; font-weight:600;
  letter-spacing:2px; margin:0; line-height:1.15; word-break:break-word;
}
.sub{
  font-family:var(--mono); font-size:10px; letter-spacing:3px;
  color:var(--dim); margin:4px 0 0;
}
.status{
  font-family:var(--mono); font-size:11px; letter-spacing:.5px;
  color:var(--ac); margin:14px 0 0;
}

/* ---------- registry head ---------- */
.reg-head{
  display:flex; justify-content:space-between; align-items:baseline;
  font-family:var(--mono); font-size:11px; letter-spacing:2px;
  color:var(--dim); margin-bottom:10px;
}

/* ---------- game unit ---------- */
.unit{
  display:grid; grid-template-columns:auto 1fr; gap:4px 14px;
  text-decoration:none; color:inherit;
  background:var(--panel); border:1px solid var(--line); border-radius:12px;
  padding:14px 15px; margin-bottom:12px;
  transition:border-color .18s ease, background .18s ease, transform .18s ease;
  animation:rise .5s ease both;
}
.unit:hover,.unit:focus-visible{
  border-color:var(--ac); background:var(--panel2); outline:none;
}
.unit:focus-visible{box-shadow:0 0 0 2px rgba(95,180,255,.4)}
.uid{
  grid-row:1 / 3;
  font-family:var(--mono); font-size:10px; letter-spacing:1px;
  color:var(--ac); background:#0d1422; border:1px solid var(--line);
  border-radius:6px; padding:5px 7px; align-self:start; white-space:nowrap;
}
.uinfo h2{font-family:var(--jp); font-size:16px; font-weight:600; margin:0}
.uinfo p{font-size:13px; color:var(--dim); margin:5px 0 0}
.tags{display:flex; flex-wrap:wrap; gap:6px; margin-top:9px}
.tags span{
  font-family:var(--mono); font-size:10px; letter-spacing:.5px;
  color:var(--dim); border:1px solid var(--line); border-radius:20px;
  padding:2px 9px;
}
.go{
  grid-column:1 / 3; justify-self:end;
  font-family:var(--mono); font-size:12px; letter-spacing:1px; color:var(--ac);
  margin-top:12px; padding-top:11px; border-top:1px dashed var(--line);
  width:100%; text-align:right;
}
.go .arrow{display:inline-block; transition:transform .18s ease}
.unit:hover .go .arrow{transform:translateX(4px)}

/* ---------- footer ---------- */
footer{
  margin-top:26px; padding-top:16px; border-top:1px solid var(--line);
  font-family:var(--mono); font-size:10px; letter-spacing:.5px;
  color:var(--dim); line-height:1.7;
}

@keyframes rise{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
@media (prefers-reduced-motion:reduce){
  *{animation:none !important; transition:none !important}
}
</style>
</head>
<body>

<header class="hd">
  <div class="brand">
    <span class="mark" aria-hidden="true">
      <svg viewBox="0 0 32 32" fill="none">
        <path d="M16 2 28 9v14L16 30 4 23V9L16 2Z" stroke="#5fb4ff" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M16 9 22 12.5v7L16 23l-6-3.5v-7L16 9Z" fill="#5fb4ff" fill-opacity=".18" stroke="#5fb4ff" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
    </span>
    <div>
      <h1>MORIKAWAJIDOSHA</h1>
      <p class="sub">GAME PORTAL</p>
    </div>
  </div>
  <p class="status">// テスト公開中・身内向け</p>
</header>

<main>
  <div class="reg-head"><span>REGISTRY</span><span>1 TITLE</span></div>

  <!-- ▼ ゲーム1件＝この <a class="unit"> ブロック。追加時はこれを複製し href とテキストを差し替える -->
  <a class="unit" href="g_arena_mobile.html">
    <span class="uid">G-ARENA</span>
    <div class="uinfo">
      <h2>ガンダムセンチネルRPG アリーナ</h2>
      <p>ランチェスター則をベースにした機動戦を、アリーナ形式で回す戦術RPG。</p>
      <div class="tags"><span>戦術RPG</span><span>スマホ</span><span>テスト版</span></div>
    </div>
    <span class="go">起動 <span class="arrow">→</span></span>
  </a>
  <!-- ▲ ここまでで1件 -->

</main>

<footer>
  一時公開中。テスト目的のため後日削除します。<br>
  非商用・身内テスト向け。
</footer>

</body>
</html>
